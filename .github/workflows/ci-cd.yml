name: CI/CD Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  test-backend:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: pgvector/pgvector:pg15
        env:
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
          POSTGRES_DB: devassist_test
        ports: ['5432:5432']
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: '20' }
      - name: Install backend deps
        run: cd backend && npm ci
      - name: Run backend tests
        run: cd backend && npm test
        env:
          DATABASE_URL: postgresql://test:test@localhost:5432/devassist_test
          JWT_SECRET: test_secret
          JWT_REFRESH_SECRET: test_refresh_secret
          OPENAI_API_KEY: test_key
          STRIPE_SECRET_KEY: test_key
          STRIPE_WEBHOOK_SECRET: test_secret
          STRIPE_PRO_PRICE_ID: test_price
          FRONTEND_URL: http://localhost:3000

  test-frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: '20' }
      - name: Install frontend deps
        run: cd frontend && npm ci
      - name: Type check
        run: cd frontend && npx tsc --noEmit
      - name: Build
        run: cd frontend && npm run build

  deploy:
    needs: [test-backend, test-frontend]
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-1
      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2
      - name: Build and push backend image
        run: |
          docker build -t devassist-backend ./backend
          docker tag devassist-backend:latest ${{ steps.login-ecr.outputs.registry }}/devassist-backend:latest
          docker push ${{ steps.login-ecr.outputs.registry }}/devassist-backend:latest
      - name: Deploy to ECS
        run: |
          aws ecs update-service \
            --cluster devassist-cluster \
            --service devassist-backend \
            --force-new-deployment
